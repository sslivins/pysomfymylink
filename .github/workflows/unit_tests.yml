name: Unit Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[tests]
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Type check (mypy)
        run: mypy --strict src
      - name: Run unit tests with coverage
        run: pytest -s -m unit --cov=src/pysomfymylink --cov-report=term-missing --cov-fail-under=80
